[formatting]
line_length = 79

[display]
reference_highlighting = true
theme = "dark"
default_table_max_columns = 50
dataframes = "rich"
cell_output = "below"
default_width = "medium"
default_table_page_size = 10
code_editor_font_size = 14

[runtime]
on_cell_change = "autorun"
output_max_bytes = 8000000
default_csv_encoding = "utf-8"
std_stream_max_bytes = 1000000
show_tracebacks = false
watcher_on_save = "lazy"
default_sql_output = "auto"
reactive_tests = true
auto_instantiate = false
auto_reload = "off"

[diagnostics]
sql_linter = true

[snippets]
custom_paths = []
include_default_snippets = true

[ai.models]
custom_models = []
edit_model = "google/gemini-3.1-pro-preview"
chat_model = "google/gemini-3.1-pro-preview"
displayed_models = ["google/gemini-3.1-pro-preview", "google/gemini-3.1-flash-lite-preview", "google/gemini-3-flash-preview"]

[ai.custom_providers]

[ai.google]
api_key = "AIzaSyDquF4PrdFcrXjLC3h2lFlZj_QI-EAiT8A"

[save]
format_on_save = false
autosave = "after_delay"
autosave_delay = 1000

[experimental]
rtc_v2 = false

[language_servers.pylsp]
enable_pyflakes = false
enabled = false
enable_flake8 = false
enable_pydocstyle = false
enable_mypy = true
enable_pylint = false
enable_ruff = true

[package_management]
manager = "pip"

[server]
follow_symlink = false
browser = "default"

[mcp]
presets = ["marimo", "context7"]

[mcp.mcpServers]

[completion]
copilot = false
activate_on_typing = true
signature_hint_on_typing = false

[keymap]
preset = "vim"

[keymap.overrides]
